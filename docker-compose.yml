services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dune_checker:dune_checker@postgres:5432/dune_checker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./results:/app/results

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dune_checker
      POSTGRES_USER: dune_checker
      POSTGRES_PASSWORD: dune_checker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dune_checker -d dune_checker"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
